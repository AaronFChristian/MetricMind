<svg width="100%" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MetricMind Data Flow Diagram</title>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1d9e75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;} .th{font-size:13px;font-weight:600;} .ts{font-size:11px;}</style>
<text class="th" x="340" y="26" text-anchor="middle" fill="#1a1a2e">Data flow — query to answer</text>
<!-- User -->
<rect x="270" y="44" width="140" height="44" rx="8" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.5"/>
<text class="th" x="340" y="62" text-anchor="middle" fill="#2c2c2a">User query</text>
<text class="ts" x="340" y="78" text-anchor="middle" fill="#5f5e5a">Natural language</text>
<line x1="340" y1="88" x2="340" y2="106" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<!-- N1 -->
<rect x="230" y="108" width="220" height="44" rx="8" fill="#9fe1cb" stroke="#1d9e75" stroke-width="0.5"/>
<text class="th" x="340" y="126" text-anchor="middle" fill="#085041">Node 1 — classify intent</text>
<text class="ts" x="340" y="142" text-anchor="middle" fill="#0f6e56">Claude Haiku, $0.00003</text>
<path d="M230 130 L140 130 L140 280" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>
<text class="ts" x="130" y="210" text-anchor="middle" fill="#888780">out of</text>
<text class="ts" x="130" y="224" text-anchor="middle" fill="#888780">scope</text>
<line x1="340" y1="152" x2="340" y2="170" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<!-- N2 -->
<rect x="230" y="172" width="220" height="44" rx="8" fill="#9fe1cb" stroke="#1d9e75" stroke-width="0.5"/>
<text class="th" x="340" y="190" text-anchor="middle" fill="#085041">Node 2 — guardrail</text>
<text class="ts" x="340" y="206" text-anchor="middle" fill="#0f6e56">PII + injection + allowlist</text>
<path d="M450 194 L544 194 L544 280" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>
<text class="ts" x="556" y="238" text-anchor="start" fill="#888780">rejected</text>
<line x1="340" y1="216" x2="340" y2="234" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<!-- N3 -->
<rect x="230" y="236" width="220" height="56" rx="8" fill="#eeedfe" stroke="#7c6af7" stroke-width="0.5"/>
<text class="th" x="340" y="256" text-anchor="middle" fill="#26215c">Node 3 — generate SQL</text>
<text class="ts" x="340" y="272" text-anchor="middle" fill="#534ab7">Claude Sonnet + prompt cache</text>
<text class="ts" x="340" y="286" text-anchor="middle" fill="#534ab7">3,000-token catalog cached</text>
<path d="M230 340 L170 340 L170 260 L230 260" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>
<text class="ts" x="144" y="306" text-anchor="middle" fill="#888780">SQL error</text>
<text class="ts" x="144" y="320" text-anchor="middle" fill="#888780">retry x2</text>
<line x1="340" y1="292" x2="340" y2="310" stroke="#7c6af7" stroke-width="1" marker-end="url(#a)"/>
<!-- N4 -->
<rect x="230" y="312" width="220" height="56" rx="8" fill="#eeedfe" stroke="#7c6af7" stroke-width="0.5"/>
<text class="th" x="340" y="332" text-anchor="middle" fill="#26215c">Node 4 — execute</text>
<text class="ts" x="340" y="348" text-anchor="middle" fill="#534ab7">DuckDB query, Redis cache</text>
<text class="ts" x="340" y="362" text-anchor="middle" fill="#534ab7">validate result shape</text>
<line x1="340" y1="368" x2="340" y2="386" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<!-- N5 -->
<rect x="230" y="388" width="220" height="44" rx="8" fill="#9fe1cb" stroke="#1d9e75" stroke-width="0.5"/>
<text class="th" x="340" y="406" text-anchor="middle" fill="#085041">Node 5 — respond</text>
<text class="ts" x="340" y="422" text-anchor="middle" fill="#0f6e56">Sonnet, confidence scoring</text>
<line x1="340" y1="432" x2="340" y2="450" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<!-- Answer -->
<rect x="230" y="452" width="220" height="56" rx="8" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.5"/>
<text class="th" x="340" y="472" text-anchor="middle" fill="#2c2c2a">Answer to user</text>
<text class="ts" x="340" y="488" text-anchor="middle" fill="#5f5e5a">Plain English + SQL + chart</text>
<text class="ts" x="340" y="504" text-anchor="middle" fill="#5f5e5a">confidence: high / med / low</text>
<!-- Rejection boxes -->
<rect x="50" y="280" width="160" height="44" rx="8" fill="#f5c4b3" stroke="#993c1d" stroke-width="0.5"/>
<text class="th" x="130" y="298" text-anchor="middle" fill="#4a1b0c">Rejection</text>
<text class="ts" x="130" y="314" text-anchor="middle" fill="#711b13">Out of scope</text>
<rect x="470" y="280" width="160" height="44" rx="8" fill="#f5c4b3" stroke="#993c1d" stroke-width="0.5"/>
<text class="th" x="550" y="298" text-anchor="middle" fill="#4a1b0c">Rejection</text>
<text class="ts" x="550" y="314" text-anchor="middle" fill="#711b13">Guardrail blocked</text>
<!-- Audit log -->
<rect x="470" y="388" width="160" height="44" rx="8" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/>
<text class="th" x="550" y="406" text-anchor="middle" fill="#412402">Audit log</text>
<text class="ts" x="550" y="422" text-anchor="middle" fill="#633806">DuckDB table</text>
<path d="M450 194 L550 194 L550 388" fill="none" stroke="#ba7517" stroke-width="0.5" stroke-dasharray="3 3"/>
<!-- Legend -->
<line x1="50" y1="560" x2="90" y2="560" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<text class="ts" x="96" y="564" fill="#1a1a2e">Happy path</text>
<line x1="50" y1="580" x2="90" y2="580" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>
<text class="ts" x="96" y="584" fill="#1a1a2e">Rejection / side channel</text>
<text class="ts" x="340" y="640" text-anchor="middle" fill="#888780">MetricMind — Data Flow Diagram</text>
</svg>
