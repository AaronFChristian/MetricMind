<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MetricMind System Overview</title>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;} .th{font-size:13px;font-weight:600;} .ts{font-size:11px;}</style>
<text class="th" x="340" y="26" text-anchor="middle" fill="#1a1a2e">How MetricMind works</text>
<text class="ts" x="340" y="44" text-anchor="middle" fill="#888780">Three pillars: governed data + AI agent + observability</text>
<!-- Pillar 1 -->
<rect x="20" y="60" width="180" height="420" rx="12" fill="#eeedfe" stroke="#7c6af7" stroke-width="0.5"/>
<text class="th" x="110" y="84" text-anchor="middle" fill="#26215c">Governed data</text>
<rect x="36" y="96" width="148" height="48" rx="6" fill="#cecbf6" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="110" y="115" text-anchor="middle" fill="#26215c">Raw seeds</text>
<text class="ts" x="110" y="131" text-anchor="middle" fill="#534ab7">1k users, 8k events</text>
<line x1="110" y1="144" x2="110" y2="158" stroke="#7c6af7" stroke-width="1" marker-end="url(#a)"/>
<rect x="36" y="160" width="148" height="48" rx="6" fill="#cecbf6" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="110" y="179" text-anchor="middle" fill="#26215c">dbt staging</text>
<text class="ts" x="110" y="195" text-anchor="middle" fill="#534ab7">4 views, typed</text>
<line x1="110" y1="208" x2="110" y2="222" stroke="#7c6af7" stroke-width="1" marker-end="url(#a)"/>
<rect x="36" y="224" width="148" height="48" rx="6" fill="#cecbf6" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="110" y="243" text-anchor="middle" fill="#26215c">dbt marts</text>
<text class="ts" x="110" y="259" text-anchor="middle" fill="#534ab7">4 tables, governed</text>
<line x1="110" y1="272" x2="110" y2="286" stroke="#7c6af7" stroke-width="1" marker-end="url(#a)"/>
<rect x="36" y="288" width="148" height="48" rx="6" fill="#cecbf6" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="110" y="307" text-anchor="middle" fill="#26215c">Metrics catalog</text>
<text class="ts" x="110" y="323" text-anchor="middle" fill="#534ab7">6 certified metrics</text>
<line x1="110" y1="336" x2="110" y2="350" stroke="#7c6af7" stroke-width="1" marker-end="url(#a)"/>
<rect x="36" y="352" width="148" height="48" rx="6" fill="#cecbf6" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="110" y="371" text-anchor="middle" fill="#26215c">dbt tests</text>
<text class="ts" x="110" y="387" text-anchor="middle" fill="#534ab7">40 tests, CI gate</text>
<rect x="36" y="416" width="148" height="32" rx="6" fill="#f5c4b3" stroke="#993c1d" stroke-width="0.5"/>
<text class="th" x="110" y="437" text-anchor="middle" fill="#4a1b0c">150+ dirty rows caught</text>
<!-- Pillar 2 -->
<rect x="220" y="60" width="240" height="420" rx="12" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.5"/>
<text class="th" x="340" y="84" text-anchor="middle" fill="#04342c">AI agent pipeline</text>
<rect x="236" y="96" width="208" height="34" rx="6" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.5"/>
<text class="th" x="340" y="118" text-anchor="middle" fill="#2c2c2a">Natural language query</text>
<line x1="340" y1="130" x2="340" y2="144" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<rect x="236" y="146" width="208" height="36" rx="6" fill="#9fe1cb" stroke="#1d9e75" stroke-width="0.5"/>
<text class="th" x="340" y="162" text-anchor="middle" fill="#085041">N1 classify intent</text>
<text class="ts" x="340" y="175" text-anchor="middle" fill="#0f6e56">Haiku $0.00003</text>
<line x1="340" y1="182" x2="340" y2="196" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<rect x="236" y="198" width="208" height="36" rx="6" fill="#9fe1cb" stroke="#1d9e75" stroke-width="0.5"/>
<text class="th" x="340" y="214" text-anchor="middle" fill="#085041">N2 guardrail check</text>
<text class="ts" x="340" y="227" text-anchor="middle" fill="#0f6e56">PII + injection + allowlist</text>
<line x1="340" y1="234" x2="340" y2="248" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<rect x="236" y="250" width="208" height="46" rx="6" fill="#cecbf6" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="340" y="268" text-anchor="middle" fill="#26215c">N3 generate SQL</text>
<text class="ts" x="340" y="282" text-anchor="middle" fill="#534ab7">Sonnet + prompt cache</text>
<text class="ts" x="340" y="294" text-anchor="middle" fill="#534ab7">60% cost saving on cache</text>
<line x1="340" y1="296" x2="340" y2="310" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<rect x="236" y="312" width="208" height="36" rx="6" fill="#cecbf6" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="340" y="328" text-anchor="middle" fill="#26215c">N4 execute + validate</text>
<text class="ts" x="340" y="341" text-anchor="middle" fill="#534ab7">DuckDB, Redis TTL 1hr</text>
<line x1="340" y1="348" x2="340" y2="362" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<rect x="236" y="364" width="208" height="36" rx="6" fill="#9fe1cb" stroke="#1d9e75" stroke-width="0.5"/>
<text class="th" x="340" y="380" text-anchor="middle" fill="#085041">N5 respond</text>
<text class="ts" x="340" y="393" text-anchor="middle" fill="#0f6e56">Sonnet, deterministic conf.</text>
<line x1="340" y1="400" x2="340" y2="414" stroke="#1d9e75" stroke-width="1" marker-end="url(#a)"/>
<rect x="236" y="416" width="208" height="46" rx="6" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.5"/>
<text class="th" x="340" y="434" text-anchor="middle" fill="#2c2c2a">Answer + SQL + chart</text>
<text class="ts" x="340" y="448" text-anchor="middle" fill="#5f5e5a">avg $0.006 / 100% eval accuracy</text>
<!-- Pillar 3 -->
<rect x="480" y="60" width="180" height="420" rx="12" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text class="th" x="570" y="84" text-anchor="middle" fill="#412402">Observability</text>
<rect x="496" y="96" width="148" height="48" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/>
<text class="th" x="570" y="115" text-anchor="middle" fill="#412402">LangSmith</text>
<text class="ts" x="570" y="131" text-anchor="middle" fill="#633806">per-node traces</text>
<rect x="496" y="160" width="148" height="48" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/>
<text class="th" x="570" y="179" text-anchor="middle" fill="#412402">Prometheus</text>
<text class="ts" x="570" y="195" text-anchor="middle" fill="#633806">scrapes /metrics 15s</text>
<rect x="496" y="224" width="148" height="48" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/>
<text class="th" x="570" y="243" text-anchor="middle" fill="#412402">Grafana</text>
<text class="ts" x="570" y="259" text-anchor="middle" fill="#633806">LLMOps dashboard</text>
<rect x="496" y="288" width="148" height="48" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/>
<text class="th" x="570" y="307" text-anchor="middle" fill="#412402">Tableau Public</text>
<text class="ts" x="570" y="323" text-anchor="middle" fill="#633806">MRR + retention</text>
<rect x="496" y="352" width="148" height="48" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/>
<text class="th" x="570" y="371" text-anchor="middle" fill="#412402">Audit log</text>
<text class="ts" x="570" y="387" text-anchor="middle" fill="#633806">every guardrail decision</text>
<rect x="496" y="416" width="148" height="32" rx="6" fill="#c0dd97" stroke="#3b6d11" stroke-width="0.5"/>
<text class="th" x="570" y="437" text-anchor="middle" fill="#173404">Eval harness 100%</text>
<!-- Connectors -->
<line x1="200" y1="270" x2="218" y2="270" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>
<line x1="460" y1="270" x2="478" y2="270" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>
<!-- CI/CD -->
<rect x="20" y="498" width="640" height="44" rx="10" fill="#b5d4f4" stroke="#185fa5" stroke-width="0.5"/>
<text class="th" x="340" y="516" text-anchor="middle" fill="#042c53">CI/CD — GitHub Actions</text>
<text class="ts" x="340" y="532" text-anchor="middle" fill="#0c447c">dbt build + pytest + eval gate (85%) + Railway deploy + Vercel deploy</text>
<text class="ts" x="340" y="575" text-anchor="middle" fill="#888780">MetricMind — System Overview</text>
</svg>
